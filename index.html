<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">
  <title>Lunchbox Landing Pages | Preview</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .preview {
      text-align: center;
      padding: var(--space-lg);
      width: 100%;
    }
    
    .preview h1 {
      margin-bottom: var(--space-xs);
    }
    
    .preview > p {
      margin-bottom: var(--space-lg);
    }
    
    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
      max-width: 700px;
      margin: 0 auto;
    }
    
    .card {
      background: var(--dark-mid);
      border: 1px solid var(--border);
      padding: var(--space-md);
      text-align: left;
      text-decoration: none;
      transition: all var(--transition);
    }
    
    .card:hover {
      border-color: var(--purple);
      transform: translateY(-4px);
    }
    
    .card__type {
      font-size: var(--font-size-small);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--purple-light);
      margin-bottom: var(--space-sm);
    }
    
    .card h2 {
      font-size: 1.25rem;
      margin-bottom: var(--space-xs);
    }
    
    .card p {
      font-size: var(--font-size-small);
    }
    
    .card__arrow {
      margin-top: var(--space-sm);
      font-size: 1.25rem;
      color: var(--purple-light);
    }
    
    @media (min-width: 640px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="preview">
    <h1>lunchbox landing pages</h1>
    <p>Conversion-optimized pages for festival season 2026</p>
    
    <div class="cards">
      <a href="listicle.html" class="card">
        <div class="card__type">Listicle</div>
        <h2>7 reasons festival-goers are switching</h2>
        <p>Scannable format. Stats, features, comparison table.</p>
        <div class="card__arrow">→</div>
      </a>
      
      <a href="advertorial.html" class="card">
        <div class="card__type">Advertorial</div>
        <h2>how one stolen phone changed everything</h2>
        <p>Story-driven editorial. Problem/solution narrative.</p>
        <div class="card__arrow">→</div>
      </a>
    </div>
  </div>
</body>
</html>
